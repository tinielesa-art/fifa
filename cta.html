<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣足球・CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100;300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
}

.bg {
  position: fixed;
  inset: 0;
  background-image: url('2_boy.png');
  background-size: cover;
  background-position: center 60%;
  filter: brightness(0.45);
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0 48px;
}

.line {
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 100;
  font-size: clamp(28px, 5vw, 56px);
  color: #ffffff;
  letter-spacing: 0.15em;
  line-height: 1.9;
  opacity: 0;
  transform: translateY(16px);
  text-align: center;
}

.line.last {
  font-weight: 300;
  margin-top: 12px;
  color: #e8e0d0;
}

.line.fade-in {
  animation: fadeUp 1.2s ease forwards;
}

.line:nth-child(1) { animation-delay: 0.3s; }
.line:nth-child(2) { animation-delay: 1.2s; }
.line:nth-child(3) { animation-delay: 2.4s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .line { animation: none; opacity: 1; transform: none; }
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div class="line fade-in">多一點的關注</div>
    <div class="line fade-in">多一點的支持</div>
    <div class="line fade-in last">台灣會有更多的可能</div>
  </div>
</body>
</html>
